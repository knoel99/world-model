<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6c5ce7"/>
    </marker>
    <marker id="arrGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#636e72"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="860" height="420" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">JEPA : predire le sens, pas les pixels</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#636e72">Joint Embedding Predictive Architecture (V-JEPA 2, AMI Labs)</text>

  <!-- ===== MAIN PIPELINE ===== -->

  <!-- Step 1: Video input -->
  <rect x="30" y="100" width="100" height="80" rx="6" fill="#dfe6e9" stroke="#6c5ce7" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Film frames -->
  <rect x="42" y="112" width="30" height="22" rx="2" fill="#b2bec3"/>
  <rect x="52" y="118" width="30" height="22" rx="2" fill="#a29bfe"/>
  <rect x="62" y="124" width="30" height="22" rx="2" fill="#6c5ce7"/>
  <text x="80" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#2d3436">Video</text>
  <text x="80" y="177" text-anchor="middle" font-size="8" fill="#636e72">1M+ heures</text>

  <!-- Arrow -->
  <line x1="130" y1="140" x2="175" y2="140" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Encoder (masking) -->
  <rect x="180" y="90" width="130" height="100" rx="8" fill="#fff" stroke="#6c5ce7" stroke-width="2" filter="url(#sh)"/>
  <text x="245" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#6c5ce7">Encodeur</text>
  <text x="245" y="126" text-anchor="middle" font-size="9" fill="#636e72">Vision Transformer</text>
  <!-- Masked grid -->
  <g transform="translate(205,132)">
    <rect x="0" y="0" width="12" height="12" fill="#a29bfe" rx="1"/>
    <rect x="14" y="0" width="12" height="12" fill="#dfe6e9" rx="1" stroke="#b2bec3" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="28" y="0" width="12" height="12" fill="#a29bfe" rx="1"/>
    <rect x="42" y="0" width="12" height="12" fill="#dfe6e9" rx="1" stroke="#b2bec3" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="56" y="0" width="12" height="12" fill="#a29bfe" rx="1"/>
    <rect x="0" y="14" width="12" height="12" fill="#dfe6e9" rx="1" stroke="#b2bec3" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="14" y="14" width="12" height="12" fill="#a29bfe" rx="1"/>
    <rect x="28" y="14" width="12" height="12" fill="#dfe6e9" rx="1" stroke="#b2bec3" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="42" y="14" width="12" height="12" fill="#a29bfe" rx="1"/>
    <rect x="56" y="14" width="12" height="12" fill="#dfe6e9" rx="1" stroke="#b2bec3" stroke-width="0.5" stroke-dasharray="2,1"/>
  </g>
  <text x="245" y="172" text-anchor="middle" font-size="7" fill="#636e72">Masquage auto-supervise</text>

  <!-- Arrow -->
  <line x1="310" y1="140" x2="360" y2="140" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Latent Space -->
  <ellipse cx="440" cy="140" rx="72" ry="55" fill="#f0edff" stroke="#6c5ce7" stroke-width="2" filter="url(#sh)"/>
  <text x="440" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#6c5ce7">Espace latent</text>
  <!-- Abstract dots -->
  <circle cx="415" cy="140" r="4" fill="#a29bfe"/>
  <circle cx="435" cy="148" r="3" fill="#6c5ce7"/>
  <circle cx="455" cy="135" r="5" fill="#a29bfe"/>
  <circle cx="465" cy="155" r="3" fill="#6c5ce7"/>
  <circle cx="425" cy="160" r="4" fill="#a29bfe"/>
  <text x="440" y="178" text-anchor="middle" font-size="8" fill="#636e72">Representations</text>
  <text x="440" y="188" text-anchor="middle" font-size="8" fill="#636e72">abstraites compactes</text>

  <!-- Arrow -->
  <line x1="512" y1="140" x2="560" y2="140" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Predictor -->
  <rect x="565" y="95" width="120" height="90" rx="8" fill="#fff" stroke="#6c5ce7" stroke-width="2" filter="url(#sh)"/>
  <text x="625" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#6c5ce7">Predicteur</text>
  <text x="625" y="135" text-anchor="middle" font-size="9" fill="#636e72">Predit l'etat</text>
  <text x="625" y="148" text-anchor="middle" font-size="9" fill="#636e72">futur en latent</text>
  <text x="625" y="170" text-anchor="middle" font-size="8" font-style="italic" fill="#6c5ce7">"La balle va tomber"</text>

  <!-- Arrow -->
  <line x1="685" y1="140" x2="730" y2="140" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Robot planning -->
  <rect x="735" y="100" width="95" height="80" rx="8" fill="#6c5ce7" stroke="#4a3db0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="782" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Planification</text>
  <text x="782" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Robot</text>
  <!-- Simple robot arm -->
  <line x1="770" y1="155" x2="770" y2="170" stroke="#fff" stroke-width="2"/>
  <line x1="770" y1="170" x2="785" y2="160" stroke="#fff" stroke-width="2"/>
  <circle cx="785" cy="158" r="3" fill="#fff"/>
  <text x="782" y="175" text-anchor="middle" font-size="7" fill="#dfe6e9">62h de fine-tuning</text>

  <!-- ===== CONTRAST: Why not pixels ===== -->
  <rect x="30" y="240" width="370" height="155" rx="8" fill="#fff3f3" stroke="#d63031" stroke-width="1.5" filter="url(#sh)"/>
  <line x1="30" y1="268" x2="400" y2="268" stroke="#d63031" stroke-width="1"/>
  <text x="40" y="260" font-size="11" font-weight="700" fill="#d63031">Pourquoi pas la prediction pixel ?</text>

  <!-- Ball on table scenario -->
  <text x="50" y="290" font-size="9" fill="#2d3436">Balle sur une table avec miettes :</text>
  <!-- Table -->
  <line x1="60" y1="340" x2="180" y2="340" stroke="#636e72" stroke-width="2"/>
  <circle cx="100" cy="330" r="8" fill="#d63031" stroke="#c0392b" stroke-width="1"/>
  <!-- Crumbs -->
  <circle cx="130" cy="336" r="1.5" fill="#636e72"/>
  <circle cx="140" cy="337" r="1" fill="#636e72"/>
  <circle cx="150" cy="335" r="1.5" fill="#636e72"/>
  <circle cx="120" cy="338" r="1" fill="#636e72"/>

  <!-- Multiple futures -->
  <text x="200" y="295" font-size="9" fill="#636e72">Futurs possibles a t+1 :</text>
  <rect x="200" y="300" width="45" height="35" rx="2" fill="#dfe6e9" stroke="#b2bec3" stroke-width="0.5"/>
  <circle cx="215" cy="325" r="3" fill="#d63031" opacity="0.6"/>
  <circle cx="225" cy="320" r="1" fill="#636e72"/>
  <rect x="252" y="300" width="45" height="35" rx="2" fill="#dfe6e9" stroke="#b2bec3" stroke-width="0.5"/>
  <circle cx="270" cy="322" r="3" fill="#d63031" opacity="0.6"/>
  <circle cx="280" cy="328" r="1" fill="#636e72"/>
  <rect x="304" y="300" width="45" height="35" rx="2" fill="#dfe6e9" stroke="#b2bec3" stroke-width="0.5"/>
  <circle cx="320" cy="318" r="3" fill="#d63031" opacity="0.6"/>
  <circle cx="330" cy="325" r="1" fill="#636e72"/>
  <text x="275" y="350" text-anchor="middle" font-size="7" fill="#636e72">Infini de details imprevisibles</text>

  <!-- X mark -->
  <text x="355" y="320" text-anchor="middle" font-size="28" font-weight="700" fill="#d63031">x</text>
  <text x="215" y="380" text-anchor="middle" font-size="9" font-weight="600" fill="#d63031">Probleme mal pose : pas de bonne reponse pixel</text>

  <!-- ===== Right: JEPA solution ===== -->
  <rect x="420" y="240" width="410" height="155" rx="8" fill="#f0edff" stroke="#6c5ce7" stroke-width="1.5" filter="url(#sh)"/>
  <line x1="420" y1="268" x2="830" y2="268" stroke="#6c5ce7" stroke-width="1"/>
  <text x="430" y="260" font-size="11" font-weight="700" fill="#6c5ce7">Solution JEPA : prediction abstraite</text>

  <text x="440" y="290" font-size="9" fill="#2d3436">Meme scenario, en espace latent :</text>

  <!-- Latent representation -->
  <ellipse cx="520" cy="330" rx="50" ry="30" fill="#e8e4ff" stroke="#a29bfe" stroke-width="1"/>
  <text x="520" y="325" text-anchor="middle" font-size="8" font-weight="600" fill="#6c5ce7">Balle</text>
  <text x="520" y="337" text-anchor="middle" font-size="8" font-weight="600" fill="#6c5ce7">bord table</text>

  <line x1="570" y1="330" x2="610" y2="330" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arr)"/>

  <ellipse cx="680" cy="330" rx="50" ry="30" fill="#e8e4ff" stroke="#6c5ce7" stroke-width="1.5"/>
  <text x="680" y="325" text-anchor="middle" font-size="8" font-weight="600" fill="#6c5ce7">Balle</text>
  <text x="680" y="337" text-anchor="middle" font-size="8" font-weight="600" fill="#6c5ce7">va tomber</text>

  <!-- Checkmark -->
  <text x="770" y="335" text-anchor="middle" font-size="28" font-weight="700" fill="#00b894">&#10003;</text>

  <text x="625" y="380" text-anchor="middle" font-size="9" font-weight="600" fill="#6c5ce7">Une seule prediction correcte, sans details inutiles</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 450" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ac" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0984e3"/>
    </marker>
    <filter id="sf" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="nvGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#4a7a00"/>
    </linearGradient>
  </defs>

  <rect width="860" height="450" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">NVIDIA Cosmos : la plateforme pour world models</text>
  <text x="430" y="50" text-anchor="middle" font-size="11" fill="#636e72">"Vendre les pioches et les pelles pendant la ruee vers l'or"</text>

  <!-- ===== LAYER 1: Data (bottom) ===== -->
  <rect x="80" y="340" width="700" height="70" rx="8" fill="#2d3436" stroke="#636e72" stroke-width="1.5" filter="url(#sf)"/>
  <text x="430" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Couche 1 : Traitement des donnees</text>
  <text x="430" y="382" text-anchor="middle" font-size="9" fill="#dfe6e9">20 millions d'heures de video | Traite en 14 jours sur Blackwell GPU</text>
  <text x="430" y="396" text-anchor="middle" font-size="8" fill="#b2bec3">(vs 3+ ans sur processeurs classiques)</text>

  <!-- Video icons -->
  <rect x="100" y="355" width="18" height="13" rx="2" fill="#636e72"/>
  <rect x="122" y="355" width="18" height="13" rx="2" fill="#636e72"/>
  <rect x="144" y="355" width="18" height="13" rx="2" fill="#636e72"/>

  <!-- Up arrow -->
  <line x1="430" y1="340" x2="430" y2="318" stroke="#636e72" stroke-width="2" marker-end="url(#ac)"/>

  <!-- ===== LAYER 2: Tokenizer ===== -->
  <rect x="80" y="248" width="700" height="68" rx="8" fill="#dfe6e9" stroke="#0984e3" stroke-width="1.5" filter="url(#sf)"/>
  <text x="430" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#0984e3">Couche 2 : Tokenizer visuel</text>

  <!-- Token grid visualization -->
  <g transform="translate(130,278)">
    <rect x="0" y="0" width="10" height="10" fill="#74b9ff" rx="1"/>
    <rect x="12" y="0" width="10" height="10" fill="#a29bfe" rx="1"/>
    <rect x="24" y="0" width="10" height="10" fill="#74b9ff" rx="1"/>
    <rect x="36" y="0" width="10" height="10" fill="#55efc4" rx="1"/>
    <rect x="48" y="0" width="10" height="10" fill="#74b9ff" rx="1"/>
    <rect x="60" y="0" width="10" height="10" fill="#ffeaa7" rx="1"/>
    <rect x="72" y="0" width="10" height="10" fill="#74b9ff" rx="1"/>
    <rect x="84" y="0" width="10" height="10" fill="#a29bfe" rx="1"/>
  </g>
  <text x="270" y="292" text-anchor="middle" font-size="8" fill="#636e72">Video → tokens visuels</text>

  <text x="560" y="292" text-anchor="middle" font-size="10" font-weight="700" fill="#0984e3">8x plus efficace</text>
  <text x="560" y="305" text-anchor="middle" font-size="8" fill="#636e72">que l'etat de l'art precedent</text>

  <!-- Up arrow -->
  <line x1="430" y1="248" x2="430" y2="226" stroke="#0984e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- ===== LAYER 3: Foundation Models ===== -->
  <rect x="80" y="148" width="700" height="76" rx="8" fill="#e8f4ff" stroke="#0984e3" stroke-width="2" filter="url(#sf)"/>
  <text x="430" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0984e3">Couche 3 : Modeles de fondation</text>

  <!-- Diffusion -->
  <rect x="110" y="180" width="180" height="35" rx="5" fill="#fff" stroke="#0984e3" stroke-width="1"/>
  <text x="200" y="196" text-anchor="middle" font-size="9" font-weight="600" fill="#2d3436">Diffusion</text>
  <text x="200" y="209" text-anchor="middle" font-size="7" fill="#636e72">bruit → refinement → prediction</text>

  <!-- Autoregressive -->
  <rect x="320" y="180" width="180" height="35" rx="5" fill="#fff" stroke="#0984e3" stroke-width="1"/>
  <text x="410" y="196" text-anchor="middle" font-size="9" font-weight="600" fill="#2d3436">Transformeurs auto-regressifs</text>
  <text x="410" y="209" text-anchor="middle" font-size="7" fill="#636e72">token par token (comme LLMs)</text>

  <!-- Training data -->
  <rect x="540" y="178" width="220" height="38" rx="5" fill="#76b900" opacity="0.15" stroke="#76b900" stroke-width="1"/>
  <text x="650" y="195" text-anchor="middle" font-size="9" font-weight="700" fill="#4a7a00">9 000 milliards de tokens</text>
  <text x="650" y="208" text-anchor="middle" font-size="7" fill="#4a7a00">20M h : conduite, industrie, robotique</text>

  <!-- Up arrow -->
  <line x1="430" y1="148" x2="430" y2="126" stroke="#0984e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- ===== LAYER 4: Application Models (top) ===== -->
  <rect x="80" y="65" width="700" height="60" rx="8" fill="url(#nvGrad)" filter="url(#sf)"/>
  <text x="430" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Couche 4 : Modeles applicatifs</text>

  <!-- Three pillars -->
  <rect x="120" y="94" width="160" height="24" rx="4" fill="#fff" opacity="0.9"/>
  <text x="200" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#4a7a00">Predict</text>
  <text x="260" y="110" text-anchor="end" font-size="7" fill="#636e72">etats futurs</text>

  <rect x="310" y="94" width="160" height="24" rx="4" fill="#fff" opacity="0.9"/>
  <text x="390" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#4a7a00">Transfer</text>
  <text x="452" y="110" text-anchor="end" font-size="7" fill="#636e72">sim → reel</text>

  <rect x="500" y="94" width="190" height="24" rx="4" fill="#fff" opacity="0.9"/>
  <text x="595" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#4a7a00">Reason</text>
  <text x="672" y="110" text-anchor="end" font-size="7" fill="#636e72">causalite, espace, temps</text>

  <!-- External teams arrow -->
  <text x="815" y="200" text-anchor="middle" font-size="8" fill="#636e72" transform="rotate(90,815,200)">Equipes externes construisent par-dessus</text>
  <line x1="800" y1="130" x2="800" y2="340" stroke="#b2bec3" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom note -->
  <rect x="200" y="420" width="460" height="25" rx="5" fill="#76b900" opacity="0.15"/>
  <text x="430" y="437" text-anchor="middle" font-size="10" font-weight="600" fill="#4a7a00">Seule approche "plateforme" : outiller, pas construire un world model</text>
</svg>